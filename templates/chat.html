<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediBot</title>
    
    <!-- Bootstrap 5 (latest) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts - Inter for clean typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="static/style.css">
</head>

<body>
    <div class="chat-container">
        <!-- Minimalist Header -->
        <div class="chat-header">
            <div class="header-left">
                <div class="bot-avatar">
                    <i class="fas fa-stethoscope"></i>
                </div>
                <div class="header-info">
                    <h2>MediBot</h2>
                </div>
            </div>
            <div class="header-actions">
                <i class="far fa-moon" id="themeToggle"></i>
                <i class="far fa-trash-alt" id="clearChat"></i>
            </div>
        </div>

        <!-- Messages Area - Seamless Flow -->
        <div class="messages-area" id="messagesArea">
            <!-- Welcome message - seamless -->
            <div class="message-wrapper">
                <div class="message bot-message">
                    <div class="message-avatar bot-avatar-small">
                        <i class="fas fa-stethoscope"></i>
                    </div>
                    <div class="message-content bot-content">
                        Hello! I'm your medical assistant. I can help answer questions about symptoms, treatments, medications, and general health information.
                    </div>
                </div>
                <div class="message-time" id="welcomeTime"></div>
            </div>
        </div>

        <!-- Quick Actions -->
        <div class="quick-actions" style="padding: 0 24px;">
            <div class="quick-action" onclick="quickQuestion('What are common cold symptoms?')">
                <i class="fas fa-thermometer-half"></i> Cold symptoms
            </div>
            <div class="quick-action" onclick="quickQuestion('How to treat headache?')">
                <i class="fas fa-head-side-brain"></i> Headache relief
            </div>
            <div class="quick-action" onclick="quickQuestion('What causes fever?')">
                <i class="fas fa-temperature-high"></i> Fever causes
            </div>
        </div>

        <!-- Input Area -->
        <div class="input-area">
            <form id="messageForm" class="input-wrapper">
                <input type="text" id="userInput" placeholder="Ask anything about health..." autocomplete="off">
                <button type="submit" id="sendButton" class="send-btn">
                    <i class="fas fa-arrow-up"></i>
                </button>
            </form>
            <div class="text-muted small mt-2 footer-text">
                MediBot can make mistakes. Consider checking important information.
            </div>
        </div>
    </div>

    <script>
        $(document).ready(function() {
            // Set welcome message time
            const now = new Date();
            const timeString = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            $('#welcomeTime').text(timeString);

            // Auto-focus input
            $('#userInput').focus();

            // Handle form submission
            $("#messageForm").on("submit", function(event) {
                event.preventDefault();
                
                const userInput = $('#userInput');
                const message = userInput.val().trim();
                
                if (!message) return;

                // Disable input while processing
                userInput.prop('disabled', true);
                $('#sendButton').prop('disabled', true);

                // Get current time
                const now = new Date();
                const timeString = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                // Add user message
                addUserMessage(message, timeString);
                
                // Clear input
                userInput.val('');

                // Show typing indicator
                showTypingIndicator();

                // Send to backend
                $.ajax({
                    url: "/get",
                    type: "POST",
                    data: { msg: message },
                    success: function(response) {
                        // Remove typing indicator
                        removeTypingIndicator();
                        
                        // Add bot response
                        addBotMessage(response, timeString);
                        
                        // Re-enable input
                        userInput.prop('disabled', false);
                        $('#sendButton').prop('disabled', false);
                        userInput.focus();
                    },
                    error: function(xhr, status, error) {
                        // Remove typing indicator
                        removeTypingIndicator();
                        
                        // Show error message
                        showErrorMessage("Sorry, I encountered an error. Please try again.");
                        
                        // Re-enable input
                        userInput.prop('disabled', false);
                        $('#sendButton').prop('disabled', false);
                        userInput.focus();
                        
                        console.error("Error:", error);
                    }
                });
            });

            // Handle enter key
            $('#userInput').keypress(function(e) {
                if (e.which === 13 && !e.shiftKey) {
                    e.preventDefault();
                    $('#messageForm').submit();
                }
            });

            // Clear chat functionality
            $('#clearChat').click(function() {
                $('#messagesArea').empty();
                // Add back welcome message
                const now = new Date();
                const timeString = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                
                // Check current theme to apply correct classes
                const isDark = $('body').hasClass('dark-theme');
                const botContentClass = isDark ? 'bot-content dark-theme' : 'bot-content';
                const botAvatarClass = isDark ? 'bot-avatar-small dark-theme' : 'bot-avatar-small';
                const timeClass = isDark ? 'message-time dark-theme' : 'message-time';
                
                const welcomeHtml = `
                    <div class="message-wrapper">
                        <div class="message bot-message">
                            <div class="message-avatar ${botAvatarClass}">
                                <i class="fas fa-stethoscope"></i>
                            </div>
                            <div class="message-content ${botContentClass}">
                                Hello! I'm your medical assistant. I can help answer questions about symptoms, treatments, medications, and general health information.
                            </div>
                        </div>
                        <div class="${timeClass}">${timeString}</div>
                    </div>
                `;
                $('#messagesArea').append(welcomeHtml);
            });

            // Theme toggle
            $('#themeToggle').click(function() {
                const isDark = $('body').hasClass('dark-theme');
                
                // Toggle icons
                $(this).toggleClass('fa-moon fa-sun');
                
                if (!isDark) {
                    // Switch to dark theme
                    $('body').addClass('dark-theme');
                    $('.chat-container').addClass('dark-theme');
                    $('.chat-header').addClass('dark-theme');
                    $('.messages-area').addClass('dark-theme');
                    $('.input-area').addClass('dark-theme');
                    $('.input-wrapper').addClass('dark-theme');
                    $('input').addClass('dark-theme');
                    $('.send-btn').addClass('dark-theme');
                    $('.quick-action').addClass('dark-theme');
                    $('.message-content').addClass('dark-theme');
                    $('.bot-avatar-small').addClass('dark-theme');
                    $('.message-time').addClass('dark-theme');
                    $('.footer-text').addClass('dark-theme');
                    $('.header-info h2').addClass('dark-theme');
                    $('.status span').addClass('dark-theme');
                    $('.header-actions i').addClass('dark-theme');
                    $('pre').addClass('dark-theme');
                    $('code').addClass('dark-theme');
                    $('.typing-indicator').addClass('dark-theme');
                    $('.error-message').addClass('dark-theme');
                    
                    // Specifically ensure bot-content has dark-theme class
                    $('.bot-content').addClass('dark-theme');
                    $('.user-content').addClass('dark-theme');
                } else {
                    // Switch to light theme
                    $('body').removeClass('dark-theme');
                    $('.chat-container').removeClass('dark-theme');
                    $('.chat-header').removeClass('dark-theme');
                    $('.messages-area').removeClass('dark-theme');
                    $('.input-area').removeClass('dark-theme');
                    $('.input-wrapper').removeClass('dark-theme');
                    $('input').removeClass('dark-theme');
                    $('.send-btn').removeClass('dark-theme');
                    $('.quick-action').removeClass('dark-theme');
                    $('.message-content').removeClass('dark-theme');
                    $('.bot-avatar-small').removeClass('dark-theme');
                    $('.message-time').removeClass('dark-theme');
                    $('.footer-text').removeClass('dark-theme');
                    $('.header-info h2').removeClass('dark-theme');
                    $('.status span').removeClass('dark-theme');
                    $('.header-actions i').removeClass('dark-theme');
                    $('pre').removeClass('dark-theme');
                    $('code').removeClass('dark-theme');
                    $('.typing-indicator').removeClass('dark-theme');
                    $('.error-message').removeClass('dark-theme');
                    
                    // Specifically remove dark-theme from bot-content and user-content
                    $('.bot-content').removeClass('dark-theme');
                    $('.user-content').removeClass('dark-theme');
                }
            });
        });

        // Quick question function
        function quickQuestion(question) {
            $('#userInput').val(question);
            $('#messageForm').submit();
        }

        // Add user message - seamless style, on the right
        function addUserMessage(message, time) {
            // Check current theme to apply correct classes
            const isDark = $('body').hasClass('dark-theme');
            const userContentClass = isDark ? 'message-content user-content dark-theme' : 'message-content user-content';
            const timeClass = isDark ? 'message-time dark-theme' : 'message-time';
            
            const messageHtml = `
                <div class="message-wrapper">
                    <div class="message user-message">
                        <div class="${userContentClass}">
                            ${escapeHtml(message)}
                        </div>
                    </div>
                    <div class="${timeClass}">${time}</div>
                </div>
            `;
            $('#messagesArea').append(messageHtml);
            scrollToBottom();
        }

        // Add bot message - seamless style
        function addBotMessage(message, time) {
            // Check current theme to apply correct classes
            const isDark = $('body').hasClass('dark-theme');
            const botAvatarClass = isDark ? 'message-avatar bot-avatar-small dark-theme' : 'message-avatar bot-avatar-small';
            const botContentClass = isDark ? 'message-content bot-content dark-theme' : 'message-content bot-content';
            const timeClass = isDark ? 'message-time dark-theme' : 'message-time';
            
            const messageHtml = `
                <div class="message-wrapper">
                    <div class="message bot-message">
                        <div class="${botAvatarClass}">
                            <i class="fas fa-stethoscope"></i>
                        </div>
                        <div class="${botContentClass}">
                            ${escapeHtml(message)}
                        </div>
                    </div>
                    <div class="${timeClass}">${time}</div>
                </div>
            `;
            $('#messagesArea').append(messageHtml);
            scrollToBottom();
        }

        // Show typing indicator - seamless
        function showTypingIndicator() {
            // Check current theme to apply correct classes
            const isDark = $('body').hasClass('dark-theme');
            const botAvatarClass = isDark ? 'message-avatar bot-avatar-small dark-theme' : 'message-avatar bot-avatar-small';
            const typingClass = isDark ? 'typing-indicator dark-theme' : 'typing-indicator';
            
            const typingHtml = `
                <div class="message-wrapper" id="typingIndicator">
                    <div class="message bot-message">
                        <div class="${botAvatarClass}">
                            <i class="fas fa-stethoscope"></i>
                        </div>
                        <div class="${typingClass}">
                            <span></span>
                            <span></span>
                            <span></span>
                        </div>
                    </div>
                </div>
            `;
            $('#messagesArea').append(typingHtml);
            scrollToBottom();
        }

        // Remove typing indicator
        function removeTypingIndicator() {
            $('#typingIndicator').remove();
        }

        // Show error message
        function showErrorMessage(message) {
            // Check current theme to apply correct classes
            const isDark = $('body').hasClass('dark-theme');
            const errorClass = isDark ? 'error-message dark-theme' : 'error-message';
            
            const errorHtml = `
                <div class="message-wrapper">
                    <div class="${errorClass}">
                        <i class="fas fa-exclamation-circle"></i>
                        ${message}
                    </div>
                </div>
            `;
            $('#messagesArea').append(errorHtml);
            scrollToBottom();
            
            // Auto-remove after 5 seconds
            setTimeout(() => {
                $('.error-message').fadeOut(300, function() {
                    $(this).remove();
                });
            }, 5000);
        }

        // Scroll to bottom
        function scrollToBottom() {
            const messagesArea = document.getElementById('messagesArea');
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
