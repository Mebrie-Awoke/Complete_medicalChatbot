<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medi</title>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts - Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="static/style.css">
</head>

<body>
    <!-- System Header - outside chat container -->
    <div class="system-header" id="systemHeader">
        <div class="header-left" id="newChatButton" style="cursor: pointer;">
            <div class="bot-avatar">
                <i class="fas fa-stethoscope"></i>
            </div>
            <div class="header-info">
                <h4>Medi 1.0</h4>
            </div>
        </div>
        <div class="header-actions">
            <i class="far fa-moon" id="themeToggle"></i>
            <i class="far fa-trash-alt" id="clearChat"></i>
        </div>
    </div>

    <!-- Main Chat Container - no header inside -->
    <div class="chat-container">
        <!-- Messages Area -->
        <div class="messages-area" id="messagesArea">
            <!-- Welcome message - without icon -->
            <div class="message-wrapper">
                <div class="message bot-message">
                    <div class="message-content bot-content">
                        Hello! I'm your medical assistant. I can help answer questions about symptoms, treatments, medications, and general health information.
                    </div>
                </div>
                <div class="message-time" id="welcomeTime"></div>
            </div>
        </div>

        <!-- Quick Actions -->
      <div class="quick-actions">
            <div class="quick-action" onclick="quickQuestion('Who built you and when?')">
               <i class="fas fa-thermometer-half"></i> Creator
            </div>
           <div class="quick-action" onclick="quickQuestion('What version are you?')">
               <i class="fas fa-head-side-brain"></i> Version
            </div>
           <div class="quick-action" onclick="quickQuestion('What is your main area of focus?')">
                <i class="fas fa-temperature-high"></i> Specialization
           </div>
        </div>

        <!-- Input Area -->
        <div class="input-area">
            <form id="messageForm" class="input-wrapper">
                <input type="text" id="userInput" placeholder="Ask anything about health..." autocomplete="off">
                <button type="submit" id="sendButton" class="send-btn">
                    <i class="fas fa-arrow-up"></i>
                </button>
            </form>
        </div>
    </div>

    <script>
        $(document).ready(function() {
            // Set welcome message time
            const now = new Date();
            const timeString = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            $('#welcomeTime').text(timeString);

            // Auto-focus input
            $('#userInput').focus();

            // Variable to track if waiting for response
            let isWaitingForResponse = false;

            // New Chat function - clears messages and starts fresh
            function startNewChat() {
                // Clear messages area
                $('#messagesArea').empty();
                
                // Reset waiting flag
                isWaitingForResponse = false;
                
                // Re-enable input if it was disabled
                $('#userInput').prop('disabled', false);
                $('#sendButton').prop('disabled', false);
                
                // Add fresh welcome message
                const now = new Date();
                const timeString = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                
                const isDark = $('body').hasClass('dark-theme');
                const botContentClass = isDark ? 'message-content bot-content dark-theme' : 'message-content bot-content';
                const timeClass = isDark ? 'message-time dark-theme' : 'message-time';
                
                const welcomeHtml = `
                    <div class="message-wrapper">
                        <div class="message bot-message">
                            <div class="${botContentClass}">
                                Hello! I'm your medical assistant. I can help answer questions about symptoms, treatments, medications, and general health information.
                            </div>
                        </div>
                        <div class="${timeClass}">${timeString}</div>
                    </div>
                `;
                $('#messagesArea').append(welcomeHtml);
                
                // Focus on input
                $('#userInput').focus();
            }

            // Make logo and Medibot text clickable to start new chat
            $('#newChatButton').click(function() {
                startNewChat();
            });

            // Handle form submission
            $("#messageForm").on("submit", function(event) {
                event.preventDefault();
                
                const userInput = $('#userInput');
                const message = userInput.val().trim();
                
                // Block if already waiting for response or message is empty
                if (isWaitingForResponse || !message) return;

                // Set waiting flag to true
                isWaitingForResponse = true;

                // Disable input while processing
                userInput.prop('disabled', true);
                $('#sendButton').prop('disabled', true);

                // Get current time
                const now = new Date();
                const timeString = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                // Add user message
                addUserMessage(message, timeString);
                
                // Clear input
                userInput.val('');

                // Show typing indicator
                showTypingIndicator();

                // Send to backend
                $.ajax({
                    url: "/get",
                    type: "POST",
                    data: { msg: message },
                    success: function(response) {
                        // Remove typing indicator
                        removeTypingIndicator();
                        
                        // Add bot response (without icon)
                        addBotMessage(response, timeString);
                        
                        // Reset waiting flag and re-enable input
                        isWaitingForResponse = false;
                        userInput.prop('disabled', false);
                        $('#sendButton').prop('disabled', false);
                        userInput.focus();
                    },
                    error: function(xhr, status, error) {
                        // Remove typing indicator
                        removeTypingIndicator();
                        
                        // Show error message
                        showErrorMessage("Sorry, I encountered an error. Please try again.");
                        
                        // Reset waiting flag and re-enable input
                        isWaitingForResponse = false;
                        userInput.prop('disabled', false);
                        $('#sendButton').prop('disabled', false);
                        userInput.focus();
                        
                        console.error("Error:", error);
                    }
                });
            });

            // Handle enter key
            $('#userInput').keypress(function(e) {
                if (e.which === 13 && !e.shiftKey) {
                    e.preventDefault();
                    // Only submit if not waiting for response
                    if (!isWaitingForResponse) {
                        $('#messageForm').submit();
                    }
                }
            });

            // Clear chat functionality (trash icon)
            $('#clearChat').click(function() {
                startNewChat(); // Reuse the same function
            });

            // Theme toggle
            $('#themeToggle').click(function() {
                $('body').toggleClass('dark-theme');
                $('.system-header').toggleClass('dark-theme');
                $('.chat-container').toggleClass('dark-theme');
                $('.messages-area').toggleClass('dark-theme');
                $('.input-area').toggleClass('dark-theme');
                $('.input-wrapper').toggleClass('dark-theme');
                $('input').toggleClass('dark-theme');
                $('.send-btn').toggleClass('dark-theme');
                $('.quick-action').toggleClass('dark-theme');
                $('.message-content').toggleClass('dark-theme');
                $('.message-time').toggleClass('dark-theme');
                $('.footer-text').toggleClass('dark-theme');
                $('.header-info h4').toggleClass('dark-theme');
                $('.status span').toggleClass('dark-theme');
                $('.header-actions i').toggleClass('dark-theme');
                $('pre').toggleClass('dark-theme');
                $('code').toggleClass('dark-theme');
                $('.typing-indicator').toggleClass('dark-theme');
                $('.error-message').toggleClass('dark-theme');
                
                // Toggle icon
                $(this).toggleClass('fa-moon fa-sun');
            });
        });

        // Quick question function
        function quickQuestion(question) {
            // Check if waiting for response
            if (window.isWaitingForResponse) return;
            
            $('#userInput').val(question);
            $('#messageForm').submit();
        }

        // Add user message
        function addUserMessage(message, time) {
            const isDark = $('body').hasClass('dark-theme');
            const userContentClass = isDark ? 'message-content user-content dark-theme' : 'message-content user-content';
            const timeClass = isDark ? 'message-time dark-theme' : 'message-time';
            
            const messageHtml = `
                <div class="message-wrapper">
                    <div class="message user-message">
                        <div class="${userContentClass}">
                            ${escapeHtml(message)}
                        </div>
                    </div>
                    <div class="${timeClass}">${time}</div>
                </div>
            `;
            $('#messagesArea').append(messageHtml);
            scrollToBottom();
        }

        // Add bot message - WITHOUT ICON
        function addBotMessage(message, time) {
            const isDark = $('body').hasClass('dark-theme');
            const botContentClass = isDark ? 'message-content bot-content dark-theme' : 'message-content bot-content';
            const timeClass = isDark ? 'message-time dark-theme' : 'message-time';
            
            const messageHtml = `
                <div class="message-wrapper">
                    <div class="message bot-message">
                        <div class="${botContentClass}">
                            ${escapeHtml(message)}
                        </div>
                    </div>
                    <div class="${timeClass}">${time}</div>
                </div>
            `;
            $('#messagesArea').append(messageHtml);
            scrollToBottom();
        }

        // Show typing indicator - WITHOUT ICON
        function showTypingIndicator() {
            const isDark = $('body').hasClass('dark-theme');
            const typingClass = isDark ? 'typing-indicator dark-theme' : 'typing-indicator';
            
            const typingHtml = `
                <div class="message-wrapper" id="typingIndicator">
                    <div class="message bot-message">
                        <div class="${typingClass}">
                            <span></span>
                            <span></span>
                            <span></span>
                        </div>
                    </div>
                </div>
            `;
            $('#messagesArea').append(typingHtml);
            scrollToBottom();
        }

        // Remove typing indicator
        function removeTypingIndicator() {
            $('#typingIndicator').remove();
        }

        // Show error message
        function showErrorMessage(message) {
            const isDark = $('body').hasClass('dark-theme');
            const errorClass = isDark ? 'error-message dark-theme' : 'error-message';
            
            const errorHtml = `
                <div class="message-wrapper">
                    <div class="${errorClass}">
                        <i class="fas fa-exclamation-circle"></i>
                        ${message}
                    </div>
                </div>
            `;
            $('#messagesArea').append(errorHtml);
            scrollToBottom();
            
            // Auto-remove after 5 seconds
            setTimeout(() => {
                $('.error-message').fadeOut(300, function() {
                    $(this).remove();
                });
            }, 5000);
        }

        // Scroll to bottom
        function scrollToBottom() {
            const messagesArea = document.getElementById('messagesArea');
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
